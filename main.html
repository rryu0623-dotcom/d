<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Object Task</title>
</head>
<body>
    <h2>JavaScript Object Properties</h2>
    
    <p><strong>1. Properties of the object:</strong></p>
    <p id="properties"></p>

    <p><strong>2. Object after deleting the 'age' property:</strong></p>
    <pre id="object-after"></pre>

    <script>
        // Sample object
        var Person = {
            firstName : "Tony",
            lastName : "Lee",
            age : 50,
            eyeColor : "Blue"
        };

        // 1. List all properties of the object
        var properties = Object.keys(Person);
        document.getElementById("properties").innerText = properties.join(", ");

        // 2. Delete the age property from the object
        delete Person.age;

        // 3. Print the object after deleting the property
        // 使用 JSON.stringify 並加上縮排參數讓輸出格式更容易閱讀
        document.getElementById("object-after").innerText = JSON.stringify(Person, null, 4);
    </script>
</body>
</html>
